services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - QWEN_API_URL=http://vllm:8001/v1
      - QWEN_MODEL=Qwen/Qwen2.5-7B-Instruct
      - USE_AMD_GPU=true
      - OPENCL_DEVICE_INDEX=0
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
